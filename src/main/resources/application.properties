spring.application.name=backend
server.port=${PORT:8082}
server.address=0.0.0.0

# H2 Database Configuration (In-Memory for Flawless Render Deployment)
spring.datasource.url=jdbc:h2:mem:homestayhub;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Spring Mail Configuration (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:tournestofc@gmail.com}
spring.mail.password=${MAIL_PASSWORD:rogkopleaitjqcgf}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.debug=true

# Misc Configuration
server.tomcat.max-http-form-post-size=200MB
server.tomcat.max-swallow-size=200MB
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
server.tomcat.connection-timeout=120000
spring.datasource.hikari.connection-timeout=120000
spring.datasource.hikari.maximum-pool-size=20
spring.jpa.properties.hibernate.format_sql=true

